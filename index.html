<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARK TECNOLOGÍA | Ecosistema Blockchain</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #3b82f6;
      --accent: #60a5fa;
      --secondary: #10b981;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.85);
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
    }

    /* LIMPIEZA TOTAL DEL TRADUCTOR */
    .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
    body { top: 0px !important; }
    
    /* Solo mostrar el icono del Mundo */
    .goog-te-gadget-simple {
      background-color: transparent !important;
      border: none !important;
      padding: 0 !important;
      cursor: pointer;
      display: flex !important;
      align-items: center !important;
    }
    .goog-te-menu-value span { display: none !important; }
    .goog-te-menu-value:before { 
      content: '🌐'; 
      font-size: 1.5rem; 
      color: white; 
      margin-right: 5px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: var(--text-main);
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                  url('https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=2000&auto=format&fit=crop') center/cover;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.2rem, 7vw, 4rem);
      margin: 0;
      letter-spacing: 3px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 30px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: 0.3s;
      font-size: 0.9rem;
    }

    .btn-register { background: var(--secondary); }

    section { padding: 80px 20px; max-width: 1100px; margin: auto; }

    h2 {
      font-family: 'Orbitron', sans-serif;
      color: var(--accent);
      border-left: 4px solid var(--primary);
      padding-left: 15px;
      margin-bottom: 40px;
      font-size: 1.5rem;
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card p { font-size: 0.85rem; color: var(--text-dim); }
    .card h3 { margin-top: 0; font-size: 1.1rem; color: #fff; }

    .calc-container {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      border: 1px solid var(--primary);
    }

    .calc-input {
      padding: 12px;
      width: 100%;
      max-width: 250px;
      border-radius: 10px;
      border: 1px solid var(--primary);
      margin: 20px 0;
      font-size: 1.1rem;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    .calc-val { font-size: 1.6rem; font-weight: bold; color: var(--secondary); }

    .whatsapp-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #25d366;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      z-index: 2000;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.8rem;
      background: #020617;
      color: var(--text-dim);
    }
  </style>
</head>

  </div>
</nav>
